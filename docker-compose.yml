# Pinned so the compose project (containers + pgdata volume) survives folder renames
name: fleet-taxi-dashboard-api

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      POSTGRES_DB: fleet
    ports: ['5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']
  redis:
    image: redis:7
    ports: ['6379:6379']
volumes:
  pgdata:
