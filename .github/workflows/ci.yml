name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: fleet
          POSTGRES_PASSWORD: fleet
          POSTGRES_DB: fleet
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U fleet"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://fleet:fleet@localhost:5432/fleet
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-session-secret
      COOKIE_DOMAIN: localhost
      CORS_ORIGINS: http://localhost:5173
      API_KEY_PEPPER: ci-api-key-pepper
      SWAGGER_ENABLED: 'true'
      LOG_LEVEL: silent

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Apply migrations
        run: pnpm db:migrate:prod

      - name: Test
        run: pnpm test

      - name: OpenAPI schema builds
        run: pnpm openapi:export
